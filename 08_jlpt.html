<style>
body {
    margin: 0;
    background-color: #121212;
    color: #f0f0f0;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 75px;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 55px;
    background: #00c853;
    display: flex;
    align-items: center;
    padding: 0 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    z-index: 1000;
}

.home-btn {
    display: flex;
    align-items: center;
    font-size: 22px;
    color: #000;
    text-decoration: none;
    font-weight: bold;
}

.home-btn:hover {
    opacity: 0.8;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 1100px;
}

/* SECTION TITLE */
.section-title {
    color: #00e676;
    font-size: 20px;
    margin: 15px 0 10px;
    border-left: 4px solid #00c853;
    padding-left: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(6, 115px);
    gap: 12px;
    margin-bottom: 20px;
}

/* CARD */
.card {
    width: 110px;
    height: 110px;
    background: #1e1e1e;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: 0.2s;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    padding: 5px;
    box-sizing: border-box;
}

.card:hover {
    background: #2d2d2d;
    transform: translateY(-3px);
}

/* ICON */
.icon {
    font-size: 46px;
    margin-bottom: 6px;
}

/* LINKS */
a {
    color: inherit;
    text-decoration: none;
}

/* SCROLLBAR */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #666;
}
</style>
</head>

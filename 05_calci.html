<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calci</title>
  <link rel="icon" href="C:\Users\nichiuser\Desktop\MyPages\0favicon\calci.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator-card {
      background: #d3d3d3;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 320px;
    }

    .display {
      background: #222;
      color: #fff;
      font-size: 2.2rem;
      text-align: right;
      padding: 20px;
      border-radius: 10px 10px 0 0;
      overflow-x: auto;
      min-height: 55px;
    }

    .preview {
      background: #222;
      color: #ccc;
      font-size: 1rem;
      text-align: right;
      padding: 5px 20px 10px;
      border-radius: 0 0 10px 10px;
      min-height: 25px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 20px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      background: #f3f3f3;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #ddd; }
    button:active { transform: scale(0.97); }
    button.zero { grid-column: span 2; }

    button.operator {
      background: #ffc107;
      color: #000;
    }

    button.operator:hover { background: #ffb300; }

    button.equal {
      background: #4caf50;
      color: white;
    }

    button.equal:hover { background: #43a047; }
  </style>
</head>
<body>

  <div class="calculator-card">
    <div class="display" id="display">0</div>
    <div class="preview" id="preview">&nbsp;</div>
    <div class="buttons">
      <button onclick="clearDisplay()">C</button>
      <button onclick="toggleSign()">+/-</button>
      <button onclick="backspace()">⌫</button>
      <button class="operator" onclick="appendOperator('/')">÷</button>

      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="appendOperator('*')">×</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="appendOperator('-')">−</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button class="operator" onclick="appendOperator('+')">+</button>

      <button class="zero" onclick="appendNumber('0')">0</button>
      <button onclick="appendDot()">.</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
	  const display = document.getElementById('display');
	  const preview = document.getElementById('preview');
	  let input = '0';
	  let resultShown = false;
	  let lastValidResult = '';

	  function updateDisplay() {
		display.textContent = formatInput(input);
		updatePreview();
	  }

	  function formatInput(inp) {
		return inp.replace(/\*/g, '×').replace(/\//g, '÷');
	  }

	  function updatePreview() {
		try {
		  // Only evaluate if input ends with number or closing parenthesis
		  if (/[\d)]$/.test(input)) {
			const res = eval(input);
			if (res !== undefined) {
			  lastValidResult = res;
			  preview.textContent = `= ${res}`;
			} else {
			  preview.textContent = `= ${lastValidResult}`;
			}
		  } else {
			// Expression is incomplete, show last valid result
			preview.textContent = lastValidResult !== '' ? `= ${lastValidResult}` : '';
		  }
		} catch {
		  preview.textContent = lastValidResult !== '' ? `= ${lastValidResult}` : '';
		}
	  }

	  function appendNumber(num) {
		if (resultShown) {
		  input = num;
		  resultShown = false;
		} else {
		  input = input === '0' ? num : input + num;
		}
		updateDisplay();
	  }

	  function appendDot() {
		const parts = input.split(/[\+\-\*\/]/);
		if (!parts[parts.length - 1].includes('.')) {
		  input += '.';
		  updateDisplay();
		}
	  }

	  function appendOperator(op) {
		if (resultShown) resultShown = false;
		if (/[+\-*/]$/.test(input)) {
		  input = input.slice(0, -1) + op;
		} else {
		  input += op;
		}
		updateDisplay();
	  }

	  function clearDisplay() {
		input = '0';
		resultShown = false;
		lastValidResult = '';
		updateDisplay();
	  }

	  function backspace() {
		if (resultShown) {
		  clearDisplay();
		  return;
		}
		input = input.length > 1 ? input.slice(0, -1) : '0';
		updateDisplay();
	  }

	  function calculate() {
		try {
		  const res = eval(input);
		  input = res.toString();
		  resultShown = true;
		  lastValidResult = input;
		  updateDisplay();
		  preview.textContent = '';
		} catch {
		  input = 'Error';
		  resultShown = true;
		  display.textContent = input;
		  preview.textContent = '';
		}
	  }

	  function toggleSign() {
		let match = input.match(/(\(-?[0-9.]+\))$|([0-9.]+)$/);
		if (!match) return;

		let start = input.slice(0, input.length - match[0].length);
		let num = match[0];

		if (num.startsWith('(-')) {
		  num = num.slice(2, -1); // unwrap
		} else {
		  num = `(-${num})`; // wrap
		}

		input = start + num;
		updateDisplay();
	  }

	  updateDisplay();
	</script>
</body>
</html>
